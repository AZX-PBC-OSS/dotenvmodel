name: Publish to PyPI

on:
  workflow_call:
    inputs:
      release_created:
        required: true
        type: boolean
      tag_name:
        required: true
        type: string
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    if: inputs.release_created || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --all-extras --group dev

    - name: Run tests
      run: uv run pytest tests/ -v

    - name: Build package
      run: uv build

    - name: Publish to PyPI
      run: uv publish
